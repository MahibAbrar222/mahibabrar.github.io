<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #fff;
            color: #333;
            overflow-x: hidden;
        }

        /* ==================== NAVBAR ==================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: #333;
            border-bottom: 1px solid rgba(135, 95, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.02);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .navbar-logo {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .logo-text {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .logo-icon {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        .logo-name {
            font-size: 1.45rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo-text:hover {
            transform: translateY(-2px);
            filter: drop-shadow(0 8px 16px rgba(139, 92, 246, 0.3));
        }

        .desktop-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.75rem 1.2rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 8px;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(139, 92, 246, 0.15);
            transform: translateY(-2px);
        }

        /* ==================== 404 SECTION ==================== */
        .not-found-section {
            background: linear-gradient(
                135deg, #333, #00406D
            );
            color: #fff;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 130px;
            text-align: center;
        }

        .not-found-content {
            max-width: 600px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
        }

        .not-found-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .not-found-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
        }

        .not-found-content p {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            margin: 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(139, 92, 246, 0.4);
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .navbar-container {
                padding: 1rem 1.5rem;
                gap: 1rem;
            }

            .logo-name {
                font-size: 1.2rem;
            }

            .desktop-nav {
                gap: 0.25rem;
            }

            .nav-link {
                font-size: 0.85rem;
                padding: 0.6rem 0.9rem;
            }

            .not-found-section {
                padding: 2rem 1rem;
                padding-top: 110px;
            }

            .not-found-code {
                font-size: 4rem;
            }

            .not-found-content h1 {
                font-size: 1.8rem;
            }

            .not-found-content p {
                font-size: 1rem;
            }

            .cta-btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .navbar-container {
                padding: 0.75rem 1rem;
            }

            .logo-name {
                font-size: 1rem;
                display: none;
            }

            .logo-icon {
                font-size: 1.2rem;
            }

            .nav-link {
                font-size: 0.75rem;
                padding: 0.5rem 0.7rem;
            }

            .not-found-code {
                font-size: 3rem;
            }

            .not-found-content h1 {
                font-size: 1.5rem;
            }

            .not-found-content p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="/" class="logo-text">
                    <span class="logo-icon">✦</span>
                    <span class="logo-name">Mahib</span>
                </a>
            </div>
            <div class="desktop-nav">
                <a href="#home" class="nav-link">Home</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <!-- 404 Content -->
    <section class="not-found-section">
        <div class="not-found-content">
            <div class="not-found-code">404</div>
            <h1>Page Not Found</h1>
            <p>Oops! The page you're looking for doesn't exist. It might have been moved or deleted.</p>
            <a href="/" class="cta-btn">Back to Home</a>
        </div>
    </section>
</body>
</html>
